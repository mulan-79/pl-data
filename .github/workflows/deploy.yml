name: Cloudflare Pages 배포

on:
  push:
    branches: [main]
    paths-ignore:
      - 'data/**'         # 데이터 파일 변경은 fetch 워크플로우가 처리
      - 'scripts/**'      # 스크립트 변경은 배포 불필요
      - '.github/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cloudflare Pages 배포
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler pages deploy . --project-name pl-data --branch main
