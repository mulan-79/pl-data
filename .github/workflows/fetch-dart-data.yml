name: DART 재무데이터 수집 & 배포

on:
  schedule:
    # 매주 월요일 오전 9시 (KST) = UTC 일요일 00:00
    - cron: '0 0 * * 1'
  workflow_dispatch:
    inputs:
      year:
        description: '연도 (예: 2024) - 비워두면 자동 감지'
        required: false
        default: ''
      quarter:
        description: '분기 (annual / Q1 / Q2 / Q3 / Q4) - 비워두면 자동 감지'
        required: false
        default: ''

jobs:
  fetch-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 의존성 설치
        run: pip install requests

      - name: DART 데이터 수집
        env:
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
        run: |
          YEAR="${{ github.event.inputs.year }}"
          QUARTER="${{ github.event.inputs.quarter }}"
          if [ -n "$YEAR" ] && [ -n "$QUARTER" ]; then
            python scripts/fetch_dart_data.py "$YEAR" "$QUARTER"
          elif [ -n "$YEAR" ]; then
            python scripts/fetch_dart_data.py "$YEAR"
          else
            python scripts/fetch_dart_data.py
          fi

      - name: 변경사항 커밋 & 푸시
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add data/
          if git diff --staged --quiet; then
            echo "새로운 데이터 없음, 커밋 스킵"
          else
            git commit -m "데이터 자동 업데이트: $(date +'%Y-%m-%d')"
            git push
          fi

      - name: Cloudflare Pages 배포
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler pages deploy . --project-name pl-data --branch main
